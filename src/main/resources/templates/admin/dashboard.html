<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel Admin — XPilot</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ── STATS ── */
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 1.5rem;
      position: relative; overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      opacity: 0; transition: opacity 0.2s;
    }
    .stat-card:hover::before { opacity: 1; }
    .stat-card.amber::before { background: linear-gradient(90deg, var(--amber), transparent); }
    .stat-card.green::before { background: linear-gradient(90deg, #4caf80, transparent); }
    .stat-card.blue::before  { background: linear-gradient(90deg, #a0a0ff, transparent); }
    .stat-card.gold::before  { background: linear-gradient(90deg, var(--amber2), transparent); }

    .stat-ico {
      width: 42px; height: 42px; border-radius: var(--r);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .stat-ico.amber { background: rgba(200,129,58,0.12); border: 1px solid rgba(200,129,58,0.2); color: var(--amber2); }
    .stat-ico.green { background: rgba(76,175,128,0.12); border: 1px solid rgba(76,175,128,0.2); color: #4caf80; }
    .stat-ico.blue  { background: rgba(160,160,255,0.12); border: 1px solid rgba(160,160,255,0.2); color: #a0a0ff; }
    .stat-ico.gold  { background: rgba(200,129,58,0.15); border: 1px solid rgba(200,129,58,0.3); color: var(--amber); }
    .stat-ico svg   { width: 20px; height: 20px; stroke-width: 1.8; }

    .stat-num {
      font-family: var(--serif); font-size: 2.2rem; font-weight: 600;
      color: var(--white); line-height: 1; margin-top: 1rem;
    }
    .stat-lbl {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-top: 6px;
    }

    /* ── SECCIONES ── */
    .section-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r2); overflow: hidden; margin-bottom: 2rem;
    }
    .section-head {
      padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px;
    }
    .section-title {
      font-family: var(--serif); font-size: 1.1rem; font-weight: 600;
      display: flex; align-items: center; gap: 10px; color: var(--white);
    }
    .section-title svg { width: 18px; height: 18px; color: var(--amber2); stroke-width: 1.8; }

    /* ── SIDEBAR ICONOS ── */
    .side-item svg { width: 16px; height: 16px; stroke-width: 1.8; flex-shrink: 0; }

    /* ── SOLICITUD CARDS ── */
    .solicitud-card {
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      transition: background 0.15s;
    }
    .solicitud-card:last-child { border-bottom: none; }
    .solicitud-card:hover { background: var(--bg3); }
    .sol-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden; color: var(--muted);
    }
    .sol-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .sol-avatar svg { width: 20px; height: 20px; stroke-width: 1.5; }
    .sol-info { flex: 1; min-width: 180px; }
    .sol-name { font-family: var(--serif); font-size: 1rem; font-weight: 600; color: var(--white); }
    .sol-meta { font-size: 12px; color: var(--muted2); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .sol-meta svg { width: 12px; height: 12px; color: var(--muted); stroke-width: 2; }
    .sol-fecha { text-align: center; min-width: 80px; }
    .sol-fecha-day { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; color: var(--white); }
    .sol-fecha-sub { font-size: 10px; color: var(--amber2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .sol-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── ARTISTA ROW ── */
    .artista-row { display: flex; align-items: center; gap: 12px; }
    .artista-av {
      width: 40px; height: 40px; border-radius: 50%; overflow: hidden;
      border: 1px solid var(--border2); flex-shrink: 0;
      background: var(--bg3); display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    .artista-av img { width: 100%; height: 100%; object-fit: cover; }
    .artista-av svg { width: 18px; height: 18px; stroke-width: 1.5; }

    /* ── FILTROS ── */
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .ftab {
      padding: 5px 14px; border-radius: 20px; font-size: 11px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--muted2);
      transition: all 0.2s; font-family: var(--sans);
    }
    .ftab.active, .ftab:hover { background: rgba(200,129,58,0.1); color: var(--amber2); border-color: rgba(200,129,58,0.35); }
    .ftab.f-green.active { background: rgba(76,175,128,0.1); color: #4caf80; border-color: rgba(76,175,128,0.35); }
    .ftab.f-red.active   { background: rgba(240,144,144,0.1); color: #f09090; border-color: rgba(240,144,144,0.35); }
    .ftab.f-blue.active  { background: rgba(160,160,255,0.1); color: #a0a0ff; border-color: rgba(160,160,255,0.35); }

    .obra-tag {
      display: inline-block; max-width: 150px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle;
    }

    /* Tooltip en botones icono */
    [data-tooltip] { position: relative; }
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      background: var(--bg); border: 1px solid var(--border2);
      color: var(--off); font-size: 11px; padding: 4px 8px;
      border-radius: 6px; white-space: nowrap; z-index: 10;
      font-family: var(--sans);
    }
  </style>
</head>
<body>
<div class="admin-wrap">

  <!-- SIDEBAR -->
  <aside class="admin-side">
    <div class="side-brand">
      <div class="logo">X<em>Pilot</em></div>
      <div class="sub">Panel de control</div>
    </div>
    <nav class="side-nav">
      <a href="#stats"       class="side-item active">
        <i data-lucide="layout-dashboard"></i>Resumen
      </a>
      <a href="#artistas"    class="side-item">
        <i data-lucide="palette"></i>Artistas
      </a>
      <a href="#solicitudes" class="side-item">
        <i data-lucide="inbox"></i>Solicitudes
      </a>
      <a href="#historial"   class="side-item">
        <i data-lucide="scroll-text"></i>Historial
      </a>
    </nav>
    <div class="side-foot">
      <div style="font-size:12px;color:var(--muted2);margin-bottom:10px;display:flex;align-items:center;gap:6px;">
        <div style="width:7px;height:7px;border-radius:50%;background:var(--jade2);box-shadow:0 0 6px var(--jade2);flex-shrink:0;"></div>
        <span th:text="${#authentication.principal.username}" style="color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
        <span class="badge bdg-admin" style="font-size:9px;flex-shrink:0;">Admin</span>
      </div>
      <form th:action="@{/logout}" method="post">
        <button class="xb xb-danger xb-sm xb-full">Cerrar sesión</button>
      </form>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <h1 style="font-family:var(--serif);font-size:1.75rem;font-weight:600;margin:0;">Panel de Control</h1>
        <div style="font-size:12px;color:var(--muted2);margin-top:2px;">Gestión de artistas y contrataciones · XPilot</div>
      </div>
      <a th:href="@{/admin/nuevo}" class="xb xb-amber" style="display:flex;align-items:center;gap:8px;">
        <i data-lucide="plus" style="width:16px;height:16px;"></i> Crear Artista
      </a>
    </div>

    <div class="admin-content">

      <!-- ── STATS ── -->
      <div id="stats" class="row g-3 mb-4">
        <div class="col-6 col-lg">
          <div class="stat-card amber">
            <div class="stat-ico amber"><i data-lucide="users"></i></div>
            <div class="stat-num" th:text="${#lists.size(mediaList)}">0</div>
            <div class="stat-lbl">Artistas</div>
          </div>
        </div>
        <div class="col-6 col-lg">
          <div class="stat-card amber">
            <div class="stat-ico amber"><i data-lucide="clock"></i></div>
            <div class="stat-num" th:text="${#lists.size(solicitudes)}">0</div>
            <div class="stat-lbl">Pendientes</div>
          </div>
        </div>
        <div class="col-6 col-lg">
          <div class="stat-card green">
            <div class="stat-ico green"><i data-lucide="check-circle"></i></div>
            <div class="stat-num" th:text="${#lists.size(aceptados)}">0</div>
            <div class="stat-lbl">Aceptados</div>
          </div>
        </div>
        <div class="col-6 col-lg">
          <div class="stat-card blue">
            <div class="stat-ico blue"><i data-lucide="file-text"></i></div>
            <div class="stat-num" th:text="${#lists.size(todos)}">0</div>
            <div class="stat-lbl">Total contratos</div>
          </div>
        </div>
        <div class="col-6 col-lg">
          <div class="stat-card gold" style="border-color:rgba(200,129,58,0.3);">
            <div class="stat-ico gold"><i data-lucide="dollar-sign"></i></div>
            <div class="stat-num" style="font-size:1.5rem;color:var(--amber2);"
                 th:text="'$' + ${#numbers.formatInteger(totalGanancias,1,'COMMA')}">$0</div>
            <div class="stat-lbl">Ganancias totales</div>
          </div>
        </div>
      </div>

      <!-- ── ARTISTAS ── -->
      <div id="artistas" class="section-wrap">
        <div class="section-head">
          <div class="section-title">
            <i data-lucide="palette"></i>
            Artistas registrados
            <span style="font-size:11px;font-weight:400;color:var(--muted2);"
                  th:text="${#lists.size(mediaList)} + ' en total'"></span>
          </div>

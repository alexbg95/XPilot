      font-size:16px;transition:all 0.2s;

    .notif-btn:hover{border-color:var(--border2);color:var(--white)}
    .notif-count{
      position:absolute;top:-5px;right:-5px;

      font-size:10px;font-weight:700;font-family:var(--sans);
      width:18px;height:18px;border-radius:50%;

<div class="gallery-header">

    <div class="sec-eyebrow fu">Directorio de artistas</div>
    <h1 style="font-family:var(--serif);font-size:3rem;font-weight:600;margin:0;" class="fu d1">Galería de Arte</h1>
    <p style="color:var(--muted2);font-size:15px;margin-top:8px;" class="fu d2">Haz clic en un artista para explorar sus obras</p>

<div class="container" style="padding:3.5rem 0 6rem;">
  <div class="row g-4" id="artistGrid">
    <div class="col-lg-4 col-md-6 fu" th:each="m,i : ${mediaList}"
         th:attr="style='animation-delay:' + ${i.index * 0.06} + 's'">
      <div class="card" style="cursor:pointer;"
           th:onclick="'window.location=\'/artista/' + ${m.id} + '\''">
        <div class="card-img-wrap">
          <img th:src="${m.tags != null and !#strings.isEmpty(m.tags) ? m.tags : (m.urlm != null and !#strings.isEmpty(m.urlm) ? m.urlm : '/media/avatar.png')}"
               class="card-img" th:alt="${m.artist}">
          <div class="card-img-overlay"></div>
          <!-- Info sobre imagen -->
          <div style="position:absolute;bottom:14px;left:16px;right:16px;">
            <div style="font-family:var(--serif);font-size:1.3rem;font-weight:600;color:#fff;" th:text="${m.artist}"></div>
            <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--amber2);margin-top:2px;" th:text="${m.style}"></div>
          </div>
          <!-- Foto de perfil -->
          <div style="position:absolute;top:14px;right:14px;" th:if="${m.urlm != null and !#strings.isEmpty(m.urlm)}">
            <img th:src="${m.urlm}" style="width:38px;height:38px;object-fit:cover;border-radius:50%;border:2px solid rgba(212,136,58,0.6);">
          </div>
        </div>
        <div class="card-actions">
          <a th:href="@{/artista/{id}(id=${m.id})}" class="xb xb-outline xb-sm" style="flex:1;justify-content:center;"
             onclick="event.stopPropagation()">Ver obras</a>
          <form th:action="@{/contratar/{id}(id=${m.id})}" method="post" style="flex:1;" onclick="event.stopPropagation()">
            <button class="xb xb-success xb-sm xb-full">Contratar</button>
          </form>
        </div>
      </div>
    </div>

    <div th:if="${mediaList == null or #lists.isEmpty(mediaList)}" class="col-12" style="text-align:center;padding:6rem 0;color:var(--muted2);">
      <div style="font-size:3rem;margin-bottom:1rem;">🎵</div>
      <div>No hay artistas disponibles aún</div>
    </div>
  </div>
</div>

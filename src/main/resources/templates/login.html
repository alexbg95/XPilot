<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Acceder — XPilot</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="auth-bg">
  <div class="auth-card fu">
    <a href="/" style="display:flex;align-items:center;gap:8px;margin-bottom:2rem;justify-content:center;text-decoration:none;">
      <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--amber2),var(--amber));display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:14px;font-weight:800;color:#000;">XP</div>
    </a>
    <div class="auth-logo">XPilot</div>
    <div class="auth-sub">Accede a tu cuenta para continuar</div>

    <div th:if="${param.error != null and param.error != '403'}" class="alert alert-err">Usuario o contraseña incorrectos</div>
    <div th:if="${param.session}" class="alert alert-warn">⏰ Tu sesión expiró</div>
    <div th:if="${param.error == '403'}" class="alert alert-warn">🔒 Acceso denegado</div>
    <div th:if="${param.logout}" class="alert alert-ok">✓ Sesión cerrada correctamente</div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label class="label">Correo electrónico</label>
        <input type="text" name="username" class="input" placeholder="tu@correo.com" required autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label class="label">Contraseña</label>
        <input type="password" name="password" class="input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="xb xb-amber xb-full">Ingresar →</button>
    </form>

    <div class="auth-sep"></div>
    <div style="text-align:center;">
      <span style="font-size:13px;color:var(--muted2);">¿No tienes cuenta?</span>
      <a href="/register" class="xb xb-outline xb-full xb-sm" style="margin-top:10px;">Crear cuenta gratis</a>
    </div>
  </div>
</div>
<script>document.querySelectorAll('input').forEach(i=>{i.style.cursor='text'});</script>
</body></html>

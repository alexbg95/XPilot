<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro — XPilot</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="auth-bg">
  <div class="auth-card fu">
    <a href="/" style="display:flex;align-items:center;justify-content:center;margin-bottom:2rem;">
      <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--amber2),var(--amber));display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:14px;font-weight:800;color:#000;">XP</div>
    </a>
    <div class="auth-logo">XPilot</div>
    <div class="auth-sub">Únete y descubre el arte</div>
    <div th:if="${error}" class="alert alert-err" th:text="${error}"></div>
    <form th:action="@{/register}" method="post">
      <div class="form-group"><label class="label">Nombre de usuario</label><input type="text" name="uname" class="input" placeholder="tu_nombre" required></div>
      <div class="form-group"><label class="label">Correo electrónico</label><input type="email" name="email" class="input" placeholder="tu@correo.com" required></div>
      <div class="form-group" style="margin-bottom:1.5rem;"><label class="label">Contraseña</label><input type="password" name="password" class="input" placeholder="••••••••" required></div>
      <button type="submit" class="xb xb-amber xb-full">Crear cuenta →</button>
    </form>
    <div class="auth-sep"></div>
    <div style="text-align:center;">
      <span style="font-size:13px;color:var(--muted2);">¿Ya tienes cuenta?</span>
      <a href="/login-view" class="xb xb-outline xb-full xb-sm" style="margin-top:10px;">Iniciar sesión</a>
    </div>
  </div>
</div>
</body></html>

spring.application.name=XPilot

# ═══════════════════════════════════════════════════════
# BASE DE DATOS — Railway inyecta estas variables automáticamente
# ═══════════════════════════════════════════════════════
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ═══════════════════════════════════════════════════════
# CLOUDINARY
# ═══════════════════════════════════════════════════════
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dbq8qaamd}
cloudinary.api-key=${CLOUDINARY_API_KEY:164226538825771}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:kZIi0qAd-VCEONukNe1QWu6Io24}

# ═══════════════════════════════════════════════════════
# MULTIPART
# ═══════════════════════════════════════════════════════
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ═══════════════════════════════════════════════════════
# SERVIDOR — Railway asigna el puerto via variable PORT
# ═══════════════════════════════════════════════════════
server.port=${PORT:8080}
